<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usta Paneli | DOS Garage İstanbul</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/jpeg" href="images/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">

<header class="site-header" id="siteHeader">
  <div class="container header-inner">
    <a href="index.html" class="brand">
      <img src="images/logo.jpg" alt="DOS Garage İstanbul Logo" class="brand-logo">
      <span class="brand-text">DOS <em>GARAGE</em></span>
    </a>
    <span class="admin-badge">Usta Paneli</span>
  </div>
</header>

<main class="section admin-page">
  <div class="container">

    <!-- GİRİŞ -->
    <div class="admin-login" id="adminLogin">
      <h1 class="center">Usta Girişi</h1>
      <p class="section-sub center">Üyelik hesabınızla (admin yetkili) giriş yapın.</p>
      <form id="adminLoginForm" class="contact-form admin-login-form">
        <div class="form-group">
          <label for="adminEmail">E-posta</label>
          <input type="email" id="adminEmail" required>
        </div>
        <div class="form-group">
          <label for="adminPassword">Şifre</label>
          <input type="password" id="adminPassword" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Giriş Yap</button>
        <p class="form-status" id="adminLoginStatus"></p>
      </form>
    </div>

    <!-- YETKİSİZ -->
    <div class="admin-denied" id="adminDenied" hidden>
      <p class="center">Bu hesabın yönetici (usta) yetkisi bulunmuyor.</p>
      <p class="center"><button class="btn btn-outline btn-sm" id="adminDeniedLogout" type="button">Çıkış Yap</button></p>
    </div>

    <!-- PANEL -->
    <div class="admin-panel" id="adminPanel" hidden>
      <div class="member-welcome">
        <span>Hoş geldiniz, <strong id="adminName"></strong></span>
        <button class="btn btn-outline btn-sm" id="adminLogoutBtn" type="button">Çıkış Yap</button>
      </div>

      <div class="form-group admin-search">
        <label for="customerSearch">Müşteri Ara (isim / telefon)</label>
        <input type="text" id="customerSearch" placeholder="Örn: Ahmet ya da 0532...">
      </div>

      <div class="admin-columns">
        <div class="admin-col">
          <h3>Aktif İşler</h3>
          <ul class="appt-list" id="activeJobsList">
            <li class="appt-empty">Yükleniyor...</li>
          </ul>
        </div>
        <div class="admin-col">
          <h3>Müşteri Geçmişi</h3>
          <div id="customerHistoryList">
            <p class="appt-empty">Yükleniyor...</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
